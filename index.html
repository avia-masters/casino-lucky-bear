<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY BEAR</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#ffe06622 0%,transparent 35%),
linear-gradient(135deg,#0b1020,#161b2f,#0d1323);
color:#fff;
}
body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:#ffd54f15;
filter:blur(120px);
border-radius:50%;
animation:float 8s ease-in-out infinite;
}
@keyframes float{
50%{
transform:translateY(-30px) scale(1.1);
}
}
.card{
position:relative;
z-index:2;
width:420px;
max-width:90%;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 20px 60px rgba(0,0,0,.45);
text-align:center;
animation:show .8s ease;
}
@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
.logo{
font-size:72px;
margin-bottom:15px;
animation:pulse 2s infinite;
}
@keyframes pulse{
50%{
transform:scale(1.08);
}
}
h1{
font-size:42px;
font-weight:800;
color:#ffd54f;
margin-bottom:15px;
}
p{
font-size:16px;
line-height:1.7;
color:#ddd;
margin-bottom:30px;
}
.button{
display:block;
text-decoration:none;
background:linear-gradient(90deg,#ffd54f,#ffb300);
padding:18px;
border-radius:18px;
color:#111;
font-size:22px;
font-weight:700;
transition:.3s;
box-shadow:0 15px 35px rgba(255,193,7,.35);
}
.button:hover{
transform:translateY(-3px);
box-shadow:0 20px 40px rgba(255,193,7,.45);
}
.small{
margin-top:20px;
opacity:.7;
font-size:13px;
}
</style>
<script>

</script>
</head>
<body>
<div class="card">

<h1>LUCKY BEAR</h1>

</p>

<div class="small">
Автоматический переход через 2,5 секунды
</div>
</div>

</html>
